// ============================================================
// 状態管理（localStorage で永続化）
// ============================================================
const STORAGE_KEY = "sharoushi2026_progress";
let progress = loadProgress();
let currentFilter = "all";

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return {};
}

function saveProgress() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
  } catch (e) {}
}

function todayStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}

function isInCurrentWeek(dateStr) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const dayOfWeek = today.getDay();
  const monday = new Date(today);
  monday.setDate(today.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  const target = new Date(dateStr);
  return target >= monday && target <= sunday;
}

function getTaskKey(date, idx) {
  return `${date}_${idx}`;
}

function isTaskDone(date, idx) {
  return !!progress[getTaskKey(date, idx)];
}

function isDayDone(day) {
  return day.tasks.every((_, idx) => isTaskDone(day.date, idx));
}

function isDayPast(dateStr) {
  return dateStr < todayStr();
}

function toggleTask(date, idx) {
  const key = getTaskKey(date, idx);
  if (progress[key]) delete progress[key];
  else progress[key] = true;
  saveProgress();
  render();
}

function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("filter" + filter[0].toUpperCase() + filter.slice(1)).classList.add("active");
  render();
}

function expandAll() {
  document.querySelectorAll(".day").forEach(d => d.classList.remove("collapsed"));
}
function collapseAll() {
  document.querySelectorAll(".day").forEach(d => d.classList.add("collapsed"));
}

function resetAll() {
  if (confirm("全ての進捗をリセットします。よろしいですか？")) {
    progress = {};
    saveProgress();
    render();
  }
}

function getDayClasses(day) {
  const classes = ["day"];
  const today = todayStr();
  const allDone = isDayDone(day);
  if (day.date === today) classes.push("today");
  if (allDone) classes.push("done");
  if (isDayPast(day.date) && !allDone) classes.push("past");
  return classes.join(" ");
}

function getTagInfo(day) {
  const today = todayStr();
  if (day.date === today) return { cls: "today-tag", text: "今日" };
  if (day.date === "2026-08-23") return { cls: "exam", text: "本試験" };
  if (day.weekday.includes("祝")) return { cls: "holiday", text: day.weekday };
  if (day.weekday === "土" || day.weekday === "日") return { cls: "weekend", text: day.weekday };
  return { cls: "", text: day.weekday };
}

function shouldShowDay(day) {
  if (currentFilter === "all") return true;
  if (currentFilter === "today") return day.date === todayStr();
  if (currentFilter === "week") return isInCurrentWeek(day.date);
  if (currentFilter === "undone") return !isDayDone(day);
  return true;
}

function getPhaseInfo(phase) {
  return {
    1: { name: "フェーズ1：5月", subtitle: "社会保険科目の再構築（健保・国年・厚年）" },
    2: { name: "フェーズ2：6月", subtitle: "既習労働3科目復元＋未修2科目（雇用・徴収）" },
    3: { name: "フェーズ3：7月", subtitle: "未修一般常識（社一・労一）＋横断＋選択式" },
    4: { name: "フェーズ4：8月", subtitle: "仕上げ・本試験" }
  }[phase];
}

function getCatLabel(cat) {
  return {
    video: "動画",
    problem: "問題",
    review: "復習",
    app: "アプリ",
    exam: "演習",
    rest: "管理"
  }[cat] || cat;
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

function render() {
  const container = document.getElementById("schedule");
  container.innerHTML = "";

  // 全体進捗
  const totalTasks = schedule.reduce((sum, d) => sum + d.tasks.length, 0);
  const doneTasks = schedule.reduce(
    (sum, d) => sum + d.tasks.filter((_, i) => isTaskDone(d.date, i)).length,
    0
  );
  const pct = totalTasks ? Math.round((doneTasks / totalTasks) * 100) : 0;
  document.getElementById("overallText").textContent =
    `全体進捗：${doneTasks} / ${totalTasks} タスク完了（${pct}%）`;
  document.getElementById("overallBar").style.width = pct + "%";

  // 試験日カウントダウン
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const examDay = new Date("2026-08-23");
  const daysLeft = Math.ceil((examDay - today) / (1000 * 60 * 60 * 24));
  const dl = document.getElementById("daysLeft");
  if (daysLeft > 0) dl.textContent = `⏰ 試験まで ${daysLeft} 日`;
  else if (daysLeft === 0) dl.textContent = `🎯 本日が試験日です`;
  else dl.textContent = `試験終了`;

  // 表示対象日
  const visibleDays = schedule.filter(shouldShowDay);

  if (visibleDays.length === 0) {
    container.innerHTML = '<div class="empty-state">該当する日がありません</div>';
    return;
  }

  // フェーズごとにグループ化
  const phaseGroups = {};
  visibleDays.forEach(day => {
    if (!phaseGroups[day.phase]) phaseGroups[day.phase] = [];
    phaseGroups[day.phase].push(day);
  });

  Object.keys(phaseGroups).forEach(phaseNum => {
    const phaseDays = phaseGroups[phaseNum];
    const info = getPhaseInfo(parseInt(phaseNum));

    // フェーズ全体のタスク数
    const phaseAllDays = schedule.filter(d => d.phase === parseInt(phaseNum));
    const phaseTotalTasks = phaseAllDays.reduce((s, d) => s + d.tasks.length, 0);
    const phaseDoneTasks = phaseAllDays.reduce(
      (s, d) => s + d.tasks.filter((_, i) => isTaskDone(d.date, i)).length, 0
    );
    const phasePct = phaseTotalTasks ? Math.round((phaseDoneTasks / phaseTotalTasks) * 100) : 0;

    const phaseDiv = document.createElement("div");
    phaseDiv.className = "phase";
    phaseDiv.innerHTML = `
      <div class="phase-header phase-${phaseNum}">
        <span>${info.name} — ${info.subtitle}</span>
        <span class="phase-progress">${phaseDoneTasks}/${phaseTotalTasks} (${phasePct}%)</span>
      </div>
    `;

    phaseDays.forEach(day => {
      const dayDiv = document.createElement("div");
      dayDiv.className = getDayClasses(day);
      const tag = getTagInfo(day);
      const dateLabel = day.date.replace("2026-", "").replace("-", "/");

      const tasksHtml = day.tasks.map((task, idx) => {
        const checked = isTaskDone(day.date, idx);
        return `
          <div class="task ${checked ? 'checked' : ''}">
            <input type="checkbox" id="t-${day.date}-${idx}" ${checked ? 'checked' : ''}
              onchange="toggleTask('${day.date}', ${idx})">
            <label for="t-${day.date}-${idx}">
              <span class="task-cat ${task.cat}">${getCatLabel(task.cat)}</span>${escapeHtml(task.text)}
            </label>
          </div>
        `;
      }).join("");

      dayDiv.innerHTML = `
        <div class="day-header">
          <span class="day-date">${dateLabel}</span>
          <span class="day-tag ${tag.cls}">${tag.text}</span>
          <span class="day-summary">${escapeHtml(day.summary)}</span>
        </div>
        <div class="day-tasks">${tasksHtml}</div>
      `;
      phaseDiv.appendChild(dayDiv);
    });

    container.appendChild(phaseDiv);
  });
}

render();
</script>
